version: '3.8'

services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - urlshortner

  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: url_shortener
      DB_USER: url_user
      DB_PASS: url_password
      BASE_URL: http://localhost
    depends_on:
      - db
    networks:
      - urlshortner

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: url_shortener
      MYSQL_USER: url_user
      MYSQL_PASSWORD: url_password
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql
    networks:
      - urlshortner

networks:
  urlshortner:

volumes:
  mysql_data:
