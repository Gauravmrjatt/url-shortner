server {
    listen 80;
    server_name osmarmy.com;
    root /var/www/html/urlshortner;
    index index.php;

    # Main index
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Short URL redirect - /s/{code}
    location /s/ {
        rewrite ^/s/(.+)$ /redirect.php?code=$1 last;
    }

    # API endpoints
    location /api/ {
        try_files $uri $uri/ /api/$1.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Deny access to config/src
    location ~ /(config|src)/ {
        deny all;
        return 403;
    }
}
